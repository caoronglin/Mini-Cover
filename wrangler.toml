# Cloudflare Workers/Pages 配置
# 文档: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "mini-cover"
main = "functions/api/[[path]].js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# 构建配置
[build]
command = "npm run build"
output_dir = "dist"

# 环境变量
[vars]
VITE_APP_TITLE = "Mini Cover - 封面生成器"
VITE_BING_API_URL = "/api"
NODE_ENV = "production"

# 密钥 (敏感信息)
[[secrets]]
BING_API_KEY = ""

# KV命名空间
[[kv_namespaces]]
binding = "MINI_COVER_KV"
id = ""

# R2存储桶 (图片存储)
[[r2_buckets]]
binding = "MINI_COVER_BUCKET"
bucket_name = "mini-cover-images"

# D1数据库 (可选)
[[d1_databases]]
binding = "MINI_COVER_DB"
database_name = "mini-cover"
database_id = ""

# 分析引擎
[analytics]
enabled = true

# 日志
[logs]
enabled = true

# 路由规则
[[routes]]
pattern = "api/*"
zone_id = ""

# 缓存规则
[cache]
enabled = true

# 图片处理
[images]
binding = "IMAGES"

# AI模型 (可选)
[ai]
binding = "AI"
